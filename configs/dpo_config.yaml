model:
  name: "mistralai/Mistral-7B-v0.1"
  load_in_4bit: false

dataset:
  name: "Anthropic/hh-rlhf"
  split: "train"
  max_samples: 5000

training:
  output_dir: "./outputs"
  num_train_epochs: 3
  per_device_train_batch_size: 2
  gradient_accumulation_steps: 4
  learning_rate: 5e-5
  max_length: 512
  max_prompt_length: 256
  report_to: "wandb"

peft:
  lora_r: 16
  lora_alpha: 32
  lora_dropout: 0.05
  target_modules: ["q_porj", "v_proj"]

adapter:
  dir: "outputs/checkpoint-1671"